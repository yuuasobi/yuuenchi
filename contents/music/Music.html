<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music - ゆうえんち</title>
    <link rel="icon" type="image/png" href="../../source/観覧車ファビコン.png">
    <link rel="shortcut icon" type="image/png" href="../../source/観覧車ファビコン.png">
    <link rel="apple-touch-icon" href="../../source/観覧車ファビコン.png">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="music-style.css">
</head>

<body>
    <script src="../../header.js"></script>

    <header class="music-header">
        <h1>🎵 LIVE STAGE 🎵</h1>
    </header>

    <div class="music-content">
        <div class="video-container">
            <div class="video-title">🎤 ライブパフォーマンス</div>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/iQCxYCDwasQ" title="LIVE STAGE Performance"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-description">
                この映像は<a href="../games/game.html?id=17"
                    style="color: #4a90e2; text-decoration: none; font-weight: 600;">#17 Live
                    Stage</a>ゲームのプレイ映像をキャプチャした映像になります。<br>
                作者のプレイ映像のライブステージをお楽しみください
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const currentLang = localStorage.getItem('selectedLanguage') || 'ja';
            if (currentLang === 'en') {
                const videoTitle = document.querySelector('.video-title');
                if (videoTitle) videoTitle.textContent = '🎤 Live Performance';

                const videoDesc = document.querySelector('.video-description');
                if (videoDesc) {
                    videoDesc.innerHTML = `
                        This video is a capture of the gameplay from <a href="../games/game.html?id=17" style="color: #4a90e2; text-decoration: none; font-weight: 600;">#17 Live Stage</a>.<br>
                        Please enjoy the live stage performance by the creator.
                    `;
                }
            }
        });
    </script>

    <footer>
        <p>&copy; 2025 ゆうえんち. All Rights Reserved.</p>
    </footer>
</body>

</html>
