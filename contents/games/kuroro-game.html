                    "The number of dishes eaten before the fullness gauge reaches MAX is recorded as high score.",
                    "All dishes are rearranged after you eat."
                ],
                controls: ["Eat", "Dash", "Options"]
            }
        };

        function updateContent() {
            const currentLang = localStorage.getItem('selectedLanguage') || 'ja';
            const urlParams = new URLSearchParams(window.location.search);
            const gameId = urlParams.get('id');
            const gameContent = document.getElementById('game-content');

            if (gameId && kurokuroGameData[gameId]) {
                const rawContent = kurokuroGameData[gameId];
                if (currentLang === 'en') {
                    const trans = kurokuroGameTranslationInfo[gameId];
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(rawContent, 'text/html');

                    // 1. タイトルと概要の置換
                    if (trans) {
                        if (trans.title) doc.querySelector('h1').textContent = trans.title;
                        if (trans.desc) doc.querySelector('p').textContent = trans.desc;
                    }

                    // 2. 基本見出しの置換
                    const h2 = doc.querySelector('h2');
                    if (h2 && h2.textContent === 'ゲーム詳細') h2.textContent = 'Game Details';

                    const h3s = doc.querySelectorAll('h3');
                    h3s.forEach(h3 => {
                        if (h3.textContent === 'テーマ') h3.textContent = 'Theme';
                        if (h3.textContent === '操作方法 (Xinputコントローラ)') h3.textContent = 'Controls (Xinput Controller)';
                        if (h3.textContent === 'システム') h3.textContent = 'System';
                        if (h3.textContent === 'クリエイター') h3.textContent = 'Creators';
                    });

                    // テーマ内容
                    if (trans && trans.theme) {
                        const themeBlock = Array.from(doc.querySelectorAll('.detail-block')).find(b => b.querySelector('h3')?.textContent === 'Theme');
                        if (themeBlock) themeBlock.querySelector('p').textContent = trans.theme;
                    }

                    // 3. 操作方法 (table) の置換
                    const tableRows = doc.querySelectorAll('.detail-block table tr');
                    tableRows.forEach((tr, rowIndex) => {
                        const td1 = tr.querySelector('td:first-child');
                        const td2 = tr.querySelector('td:last-child');
                        if (td1 && td2) {
                            // アクション名の翻訳
                            let actionJa = td1.textContent.trim();
                            if (actionTranslations[actionJa]) {
                                td1.textContent = actionTranslations[actionJa];
                            }

                            // ボタン名/キー名の翻訳
                            if (trans && trans.controls && trans.controls[rowIndex]) {
                                // 個別翻訳データがある場合は優先使用
                                td2.textContent = trans.controls[rowIndex];
                            } else {
                                // 汎用的な置換
                                let btnText = td2.textContent;
                                btnText = btnText.replace(/Bボタン/g, 'B Button')
                                    .replace(/Aボタン/g, 'A Button')
                                    .replace(/Xボタン/g, 'X Button')
                                    .replace(/Yボタン/g, 'Y Button')
                                    .replace(/LBボタン/g, 'LB Button')
                                    .replace(/RBボタン/g, 'RB Button')
                                    .replace(/RTボタン/g, 'RT Button')
                                    .replace(/LTボタン/g, 'LT Button')
                                    .replace(/Backボタン/g, 'Back Button')
                                    .replace(/STARTボタン/g, 'Start Button')
                                    .replace(/上方向キー/g, 'Up Key')
                                    .replace(/右キー/g, 'Right Key')
                                    .replace(/左キー/g, 'Left Key')
                                    .replace(/上下キー/g, 'Up/Down Keys')
                                    .replace(/左右キー/g, 'Left/Right Keys')
                                    .replace(/キーボード/g, 'Keyboard')
                                    .replace(/Y長押し/g, 'Hold Y');
                                td2.textContent = btnText;
                            }

                            // 記号の変換 (共通)
                            td2.textContent = td2.textContent
                                .replace(/：/g, ': ')
                                .replace(/、/g, ', ')
                                .replace(/・/g, '/');
                        }
                    });

                    // 4. システム (p/ul/li) の置換
                    const systemBlock = Array.from(doc.querySelectorAll('.detail-block')).find(b => b.querySelector('h3')?.textContent === 'System');
                    if (systemBlock && trans && trans.systems) {
                        const systemElements = systemBlock.querySelectorAll('p, li');
                        systemElements.forEach((el, index) => {
                            if (trans.systems[index]) {
                                el.textContent = trans.systems[index];
                            }
                        });
                    }

                    // 5. クリエイターセクションの置換
                    const creatorBlock = Array.from(doc.querySelectorAll('.detail-block')).find(b => b.querySelector('h3')?.textContent === 'Creators');
                    if (creatorBlock) {
                        const p = creatorBlock.querySelector('p');
                        if (p) p.textContent = "The following creators' works are used in this game.";

                        creatorBlock.querySelectorAll('table td').forEach(td => {
                            if (td.textContent === 'イラスト') td.textContent = 'Illustration';
                            if (td.textContent === 'BGM') td.textContent = 'BGM';
                            if (td.textContent === '効果音') td.textContent = 'Sound Effects';

                            // クリエイター名「くろろ」の置換
                            if (td.textContent.trim() === 'くろろ') td.textContent = 'Kuroro';
                        });
                    }

                    // 6. 購入ボタン
                    const purchaseBtn = doc.querySelector('.purchase-button');
                    if (purchaseBtn) purchaseBtn.textContent = 'Purchase on itch.io';

                    gameContent.innerHTML = doc.body.innerHTML;
                } else {
                    gameContent.innerHTML = rawContent;
                }
            } else {
                const errorMsg = currentLang === 'en' ? 'Game not found.' : '指定されたゲームが見つかりませんでした。';
                gameContent.innerHTML = `
                    <div class="container">
                        <h1>${currentLang === 'en' ? 'Game Not Found' : 'Game Not Found'}</h1>
                        <p>${errorMsg}</p>
                        <a href="WCG.html" class="back-button">${currentLang === 'en' ? 'Back to WCG Page' : 'WCGページに戻る'}</a>
                    </div>
                `;
            }
        }

        // 初期表示
        updateContent();

        // 言語切り替えの監視
        window.addEventListener('storage', (e) => {
            if (e.key === 'selectedLanguage') {
                updateContent();
            }
        });

        // カスタムイベントの監視 (同じタブ内での変更用)
        window.addEventListener('languageChanged', () => {
            updateContent();
        });

        // URLパラメータのチェック (直リンク用)
        const checkLangParam = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const lang = urlParams.get('lang');
            if (lang) {
                localStorage.setItem('selectedLanguage', lang);
                updateContent();
            }
        };
        checkLangParam();
    </script>
</body>

</html>
