        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const gameId = urlParams.get('id');
            const gameContent = document.getElementById('game-content');

            // 言語設定の取得
            const currentLang = localStorage.getItem('selectedLanguage') || 'ja';

            if (gameId && gameData[gameId]) {
                const rawContent = gameData[gameId];

                if (currentLang === 'en') {
                    // DOMParserを使用してHTMLを構造的に解析
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(rawContent, 'text/html');
                    const trans = gameTranslationInfo[gameId];

                    // 1. タイトル (h1) と 説明文 (最初のp) の置換
                    if (trans) {
                        const h1 = doc.querySelector('h1');
                        if (h1) h1.textContent = trans.title;

                        const firstP = doc.querySelector('.container > p');
                        if (firstP) firstP.textContent = trans.description;

                        // Themeセクションの置換
                        const detailBlocks = doc.querySelectorAll('.detail-block');
                        detailBlocks.forEach(block => {
                            const h3 = block.querySelector('h3');
                            const p = block.querySelector('p');
                            if (h3 && h3.textContent.includes('テーマ') && p) {
                                p.textContent = trans.theme;
                            }
                        });
                    }

                    // 2. 見出しの置換 (h2, h3)
                    doc.querySelectorAll('h2').forEach(h2 => {
                        if (h2.textContent === 'ゲーム詳細') h2.textContent = 'Game Details';
                    });
                    doc.querySelectorAll('h3').forEach(h3 => {
                        if (h3.textContent === 'テーマ') h3.textContent = 'Theme';
                        if (h3.textContent.includes('操作方法')) h3.textContent = 'Controls (Xinput Controller)';
                        if (h3.textContent === 'システム') h3.textContent = 'Systems';
                        if (h3.textContent === 'クリエイター') h3.textContent = 'Creators';
                    });

                    // 3. 操作方法 (table) の置換
                    const tableRows = doc.querySelectorAll('table tr');
                    if (trans && trans.controls) {
                        // 個別設定がある場合はそれを使用
                        tableRows.forEach((tr, index) => {
                            const td1 = tr.querySelector('td:first-child');
                            const td2 = tr.querySelector('td:last-child');
                            if (td1 && td2 && trans.controls[index]) {
                                td1.textContent = trans.controls[index].action;
                                td2.textContent = trans.controls[index].btn;
                            }
                        });
                    } else {
                        // 個別設定がない場合は汎用置換
                        tableRows.forEach(tr => {
                            const td1 = tr.querySelector('td:first-child');
                            const td2 = tr.querySelector('td:last-child');
                            if (td1 && td2) {
                                // アクション名の翻訳 (「/」区切りに対応)
                                let actionJa = td1.textContent.trim();
                                if (actionJa.includes('/')) {
                                    const parts = actionJa.split('/');
                                    const translatedParts = parts.map(p => actionTranslations[p.trim()] || p.trim());
                                    td1.textContent = translatedParts.join('/');
                                } else if (actionTranslations[actionJa]) {
                                    td1.textContent = actionTranslations[actionJa];
                                }

                                // ボタン名/キー名の翻訳
                                let btnText = td2.textContent;
                                btnText = btnText.replace(/Bボタン/g, 'B Button')
                                    .replace(/Aボタン/g, 'A Button')
                                    .replace(/Xボタン/g, 'X Button')
                                    .replace(/Yボタン/g, 'Y Button')
                                    .replace(/LBボタン/g, 'LB Button')
                                    .replace(/RBボタン/g, 'RB Button')
                                    .replace(/RTボタン/g, 'RT Button')
                                    .replace(/LTボタン/g, 'LT Button')
                                    .replace(/Backボタン/g, 'Back Button')
                                    .replace(/backボタン/g, 'Back Button')
                                    .replace(/STARTボタン/g, 'Start Button')
                                    .replace(/\bRT\b(?! Button)/g, 'RT Button')
                                    .replace(/\bLT\b(?! Button)/g, 'LT Button')
                                    .replace(/\bBack\b(?! Button)/gi, 'Back Button')
                                    .replace(/\bSTART\b(?! Button)/g, 'Start Button')
                                    .replace(/上下キー/g, 'Up/Down Keys')
                                    .replace(/左右キー/g, 'Left/Right Keys')
                                    .replace(/上下左右キー/g, 'D-Pad')
                                    .replace(/十字キー/g, 'D-Pad')
                                    .replace(/アナログスティック/g, 'Analog Stick')
                                    .replace(/右スティック/g, 'Right Stick')
                                    .replace(/左スティック/g, 'Left Stick')
                                    .replace(/キーボード/g, 'Keyboard');
                                td2.textContent = btnText;
                            }
                        });
                    }

                    // 4. システム (ul/li) の置換
                    const systemLis = doc.querySelectorAll('.detail-block ul li');
                    if (trans && trans.systems) {
                        // 個別設定がある場合はそれを使用
                        systemLis.forEach((li, index) => {
                            if (trans.systems[index]) {
                                li.textContent = trans.systems[index];
                            }
                        });
                    } else {
                        // 個別設定がない場合は汎用置換
                        systemLis.forEach(li => {
                            let text = li.textContent;
                            text = text.replace(/スコア/g, 'Score')
                                .replace(/ハイスコア/g, 'High Score')
                                .replace(/ゲージ/g, 'Gauge')
                                .replace(/アイテム/g, 'Item')
                                .replace(/レベル/g, 'Level')
                                .replace(/ターン/g, 'Turn')
                                .replace(/ステージ/g, 'Stage')
                                .replace(/タイム/g, 'Time')
                                .replace(/制限時間/g, 'Time Limit')
                                .replace(/最大/g, 'Max')
                                .replace(/経験値/g, 'EXP')
                                .replace(/クイズ/g, 'Quiz')
                                .replace(/体力/g, 'HP')
                                .replace(/ダメージ/g, 'Damage')
                                .replace(/攻撃力/g, 'ATK')
                                .replace(/防御力/g, 'DEF')
                                .replace(/魔力/g, 'MATK')
                                .replace(/魔法力/g, 'MATK')
                                .replace(/属性/g, 'Element')
                                .replace(/弱点/g, 'Weakness')
                                .replace(/状態異常/g, 'Status Ailment')
                                .replace(/バフ/g, 'Buff')
                                .replace(/デバフ/g, 'Debuff')
                                .replace(/回復/g, 'Recovery')
                                .replace(/復活/g, 'Revive')
                                .replace(/敵/g, 'Enemy')
                                .replace(/勝利/g, 'Victory')
                                .replace(/敗北/g, 'Defeat')
                                .replace(/終了/g, 'End')
                                .replace(/メニュー/g, 'Menu')
                                .replace(/設定/g, 'Settings')
                                .replace(/ cheese /g, ' Cheese ')
                                .replace(/ HP /g, ' HP ')
                                // 特徴的な長文のパターン置換
                                .replace(/HPが0になるまでに獲得したスコアがハイスコアとして記録される/g, 'The score obtained before HP reaches 0 is recorded as the high score.')
                                .replace(/体力が0になるまでに食べたチーズの数がハイスコアとして記録される/g, 'The number of cheese eaten before HP reaches 0 is recorded as the high score.')
                                .replace(/時間経過で体力が減り、徘徊しているネズミにぶつかると大幅に体力が削られる/g, 'HP decreases over time, and colliding with wandering mice significantly reduces HP.')
                                .replace(/チーズを食べきることでスコアを獲得できる/g, 'You can earn scores by eating all the cheese.')
                                .replace(/チーズを食べると体力が少しずつ回復する/g, 'Eating cheese gradually restores HP.')
                                .replace(/ラーメンスープとトッピングを組み合わせてオリジナルのラーメンを作る/g, 'Create your original ramen by combining ramen soup and toppings.');
                            li.textContent = text;
                        });
                    }

                    // 5. クリエイターセクションの置換
                    const creatorBlock = Array.from(doc.querySelectorAll('.detail-block')).find(b => b.querySelector('h3')?.textContent === 'Creators');
                    if (creatorBlock) {
                        const p = creatorBlock.querySelector('p');
                        if (p) p.textContent = "The following creators' works are used in this game.";

                        creatorBlock.querySelectorAll('table td').forEach(td => {
                            if (td.textContent === 'イラスト') td.textContent = 'Illustration';
                            if (td.textContent === '効果音') td.textContent = 'Sound Effects';
                            if (td.textContent === 'BGM') td.textContent = 'BGM';
                            if (td.textContent === 'ドット絵') td.textContent = 'Pixel Art';
                            if (td.textContent === '3D model') td.textContent = '3D Model'; // Added 3D model
                            if (td.textContent === 'プログラム') td.textContent = 'Program';
                            if (td.textContent === 'ゲームデザイン') td.textContent = 'Game Design';
                        });
                    }

                    // 6. 購入ボタン
                    const purchaseBtn = doc.querySelector('.purchase-button');
                    if (purchaseBtn) purchaseBtn.textContent = 'Purchase on itch.io';

                    gameContent.innerHTML = doc.body.innerHTML;
                } else {
                    gameContent.innerHTML = rawContent;
                }
            } else {
                const errorMsg = currentLang === 'en' ? 'Game not found.' : '指定されたゲームが見つかりません。';
                gameContent.innerHTML = `<p>${errorMsg}</p>`;
            }

            // フェードイン
            document.body.style.opacity = 1;
        });
